{% extends 'base.html' %}
{% block content %}
<h1>Tags</h1>
<a href="{% url 'tasks:tag-add' %}">➕ Add Tag</a>
<table>
    <tr>
        <th>Name</th>
        <th>Actions</th>
    </tr>
    {% for tag in tags %}
    <tr>
        <td>{{ tag.name }}</td>
        <td>
            <a href="{% url 'tasks:tag-edit' tag.id %}">✏️</a> |
            <a href="{% url 'tasks:tag-delete' tag.id %}">🗑️</a>
        </td>
    </tr>
    {% empty %}
    <tr><td colspan="2">No tags yet.</td></tr>
    {% endfor %}
</table>
{% endblock %}
