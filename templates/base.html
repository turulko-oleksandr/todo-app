<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; margin: 0; }
        .sidebar { background: #333; color: #fff; padding: 20px; width: 200px; height: 100vh; }
        .sidebar a { color: #fff; text-decoration: none; display: block; margin: 10px 0; }
        .content { flex: 1; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #ddd; padding: 8px; }
        form p {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }

    .form-control {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box; /* Важливо, щоб padding не розширював поле за межі 100% */
        font-size: 16px;
    }

    /* Спеціальний стиль для поля тегів (SelectMultiple) */
    .form-select {
        height: auto !important; /* Дозволити йому розтягуватися на висоту всіх опцій */
    }

    button[type="submit"] {
        background-color: #007bff;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }

    button[type="submit"]:hover {
        background-color: #0056b3;
    }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Menu</h2>
        <a href="{% url 'tasks:home' %}">Home</a>
        <a href="{% url 'tasks:tag-list' %}">Tags</a>
    </div>
    <div class="content">
      {% block content %}
      {% endblock %}
    </div>
</body>
</html>
